<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEO Content Optimizer — bilaldalgun.com</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f8f6;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.container{max-width:640px;margin:0 auto}
.header{margin-bottom:2rem}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:3px 10px;border-radius:6px;margin-bottom:12px;background:#E1F5EE;color:#085041;border:1px solid #9FE1CB}
h1{font-size:24px;font-weight:600;color:#1a1a1a;margin-bottom:6px}
.subtitle{font-size:14px;color:#666;line-height:1.5}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.label{font-size:11px;color:#999;margin-bottom:8px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
input[type=email],textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;color:#1a1a1a;background:#fff;outline:none;font-family:inherit;transition:border-color 0.15s}
input[type=email]:focus,textarea:focus{border-color:#1D9E75;box-shadow:0 0 0 3px rgba(29,158,117,0.1)}
textarea{resize:vertical;min-height:140px;line-height:1.6}
.char-count{font-size:12px;color:#999;text-align:right;margin-top:4px}
.quota-bar{display:flex;gap:6px;margin-top:10px}
.quota-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid #ddd;background:transparent}
.quota-dot.used{background:#1D9E75;border-color:#1D9E75}
.quota-label{font-size:12px;color:#666;margin-top:6px}
.btn{width:100%;padding:13px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.btn:hover{opacity:0.88}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.error{padding:10px 12px;background:#FCEBEB;border-radius:8px;font-size:13px;color:#A32D2D;margin-top:8px;border:1px solid #f7c1c1}
.loading{display:flex;align-items:center;gap:10px;padding:1.5rem 0;color:#666;font-size:14px}
.spinner{width:18px;height:18px;border:2px solid #e8e8e4;border-top-color:#1D9E75;border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.result-card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:1.5rem;margin-top:1rem}
.score-row{display:flex;align-items:center;gap:16px;margin-bottom:1.5rem}
.score-circle{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0;border:3px solid}
.score-num{font-size:28px;font-weight:700}
.score-sub{font-size:11px;margin-top:1px}
.score-info h3{font-size:15px;font-weight:600;margin-bottom:4px}
.score-info p{font-size:13px;color:#666;line-height:1.5}
.platform-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.platform-item{background:#f8f8f6;border-radius:8px;padding:12px;text-align:center;border:1px solid #e8e8e4}
.platform-name{font-size:11px;color:#999;margin-bottom:4px;font-weight:500}
.platform-score{font-size:18px;font-weight:700}
.sec-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:8px}
.issue-item{font-size:13px;color:#666;padding:8px 12px;background:#fff5f5;border-left:3px solid #E24B4A;border-radius:0 6px 6px 0;margin-bottom:6px}
.suggest-item{font-size:13px;color:#666;padding:8px 12px;background:#f0faf5;border-left:3px solid #1D9E75;border-radius:0 6px 6px 0;margin-bottom:6px}
.cta-box{background:#E1F5EE;border-radius:12px;padding:1.25rem;text-align:center;margin-top:1rem;border:1px solid #9FE1CB}
.cta-box p{font-size:13px;color:#085041;margin-bottom:12px;line-height:1.5}
.cta-box a{display:inline-block;background:#1D9E75;color:#fff;padding:9px 22px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none}
.limit-box{background:#FCEBEB;border-radius:12px;padding:1.5rem;text-align:center;margin-top:1rem;border:1px solid #f7c1c1}
.limit-box h3{font-size:16px;font-weight:600;color:#A32D2D;margin-bottom:8px}
.limit-box p{font-size:13px;color:#791F1F;margin-bottom:16px;line-height:1.5}
.limit-btn{display:block;width:100%;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:8px;border:none}
.limit-btn-primary{background:#A32D2D;color:#fff}
.limit-btn-secondary{background:transparent;border:1px solid #A32D2D;color:#A32D2D}
.remaining{font-size:12px;color:#999;text-align:center;margin-top:1rem}
.btn-secondary{width:100%;padding:11px;background:transparent;color:#1D9E75;border:1px solid #1D9E75;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;transition:background 0.15s}
.btn-secondary:hover{background:#f0faf5}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="badge">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#085041" stroke-width="1.5"><circle cx="6" cy="6" r="5"/><path d="M6 3v3l2 1"/></svg>
      bilaldalgun.com
    </span>
    <h1>GEO Content Optimizer</h1>
    <p class="subtitle">İçeriğinizin ChatGPT, Perplexity ve Gemini'de ne kadar alıntılanabileceğini analiz edin.</p>
  </div>

  <div id="form-area">
    <div class="card">
      <div class="label">E-posta adresiniz</div>
      <input type="email" id="email-input" placeholder="ornek@sirket.com" />
      <div id="quota-area" style="display:none;margin-top:10px">
        <div class="quota-bar" id="quota-dots"></div>
        <div class="quota-label" id="quota-label"></div>
      </div>
    </div>
    <div class="card">
      <div class="label">Analiz edilecek içerik</div>
      <textarea id="content-input" placeholder="Blog yazınızı, ürün açıklamanızı veya web sayfası içeriğinizi buraya yapıştırın. En az 100 karakter olmalı."></textarea>
      <div class="char-count"><span id="char-count">0</span> karakter</div>
    </div>
    <div id="error-area"></div>
    <button class="btn" id="analyze-btn" onclick="handleAnalyze()">İçeriği analiz et</button>
  </div>

  <div id="loading-area" style="display:none">
    <div class="loading">
      <div class="spinner"></div>
      <span id="loading-text">İçerik analiz ediliyor...</span>
    </div>
  </div>

  <div id="result-area"></div>
  <div id="limit-area"></div>
</div>

<script>
const SUPABASE_URL = 'https://lzqfscbxgmlkiinmmoug.supabase.co';
const SUPABASE_KEY = 'sb_publishable_pipAKFXzbIc66uYThhRTDg_-EAIj0tr';
const EDGE_FN = SUPABASE_URL + '/functions/v1/geo-analyze';
const MAX_QUERIES = 3;

const emailInput = document.getElementById('email-input');
const contentInput = document.getElementById('content-input');
const charCount = document.getElementById('char-count');
const errorArea = document.getElementById('error-area');
const loadingArea = document.getElementById('loading-area');
const resultArea = document.getElementById('result-area');
const limitArea = document.getElementById('limit-area');
const formArea = document.getElementById('form-area');
const analyzeBtn = document.getElementById('analyze-btn');
const quotaArea = document.getElementById('quota-area');
const quotaDots = document.getElementById('quota-dots');
const quotaLabel = document.getElementById('quota-label');
const loadingText = document.getElementById('loading-text');

contentInput.addEventListener('input', () => { charCount.textContent = contentInput.value.length; });

let debounce;
emailInput.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => checkQuota(emailInput.value), 600);
});

async function sbFetch(path, options={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || 'return=representation',
      ...(options.headers||{})
    }
  });
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function checkQuota(email) {
  if (!email || !email.includes('@')) { quotaArea.style.display='none'; return; }
  try {
    const data = await sbFetch('leads?email=eq.' + encodeURIComponent(email) + '&select=query_count');
    const count = data && data.length > 0 ? data[0].query_count : 0;
    renderQuota(count);
    quotaArea.style.display = 'block';
    if (count >= MAX_QUERIES) {
      analyzeBtn.disabled = true;
      analyzeBtn.textContent = 'Sorgu hakkınız doldu';
    } else {
      analyzeBtn.disabled = false;
      analyzeBtn.textContent = 'İçeriği analiz et';
    }
  } catch(e) {}
}

function renderQuota(count) {
  quotaDots.innerHTML = '';
  for (let i = 0; i < MAX_QUERIES; i++) {
    const d = document.createElement('div');
    d.className = 'quota-dot' + (i < count ? ' used' : '');
    quotaDots.appendChild(d);
  }
  const remaining = MAX_QUERIES - count;
  quotaLabel.textContent = remaining > 0 ? remaining + ' sorgu hakkınız kaldı' : 'Sorgu hakkınız doldu';
}

function showError(msg) { errorArea.innerHTML = '<div class="error">' + msg + '</div>'; }
function clearError() { errorArea.innerHTML = ''; }

async function handleAnalyze() {
  const email = emailInput.value.trim();
  const content = contentInput.value.trim();
  clearError();
  if (!email || !email.includes('@')) { showError('Geçerli bir e-posta adresi girin.'); return; }
  if (content.length < 100) { showError('İçerik en az 100 karakter olmalıdır.'); return; }

  formArea.style.display = 'none';
  loadingArea.style.display = 'block';
  resultArea.innerHTML = '';
  limitArea.innerHTML = '';

  try {
    const leads = await sbFetch('leads?email=eq.' + encodeURIComponent(email) + '&select=id,query_count');
    const existing = leads && leads.length > 0 ? leads[0] : null;
    const currentCount = existing ? existing.query_count : 0;

    if (currentCount >= MAX_QUERIES) {
      loadingArea.style.display = 'none';
      showLimitReached();
      return;
    }

    loadingText.textContent = 'Claude ile GEO analizi yapılıyor...';

    const res = await fetch(EDGE_FN, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'apikey': SUPABASE_KEY
      },
      body: JSON.stringify({ content })
    });

    if (!res.ok) throw new Error('Analiz başarısız oldu, tekrar deneyin.');
    const result = await res.json();
    if (result.error) throw new Error(result.error);

    loadingText.textContent = 'Sonuçlar kaydediliyor...';

    if (existing) {
      await sbFetch('leads?email=eq.' + encodeURIComponent(email), {
        method: 'PATCH', prefer: 'return=minimal',
        body: JSON.stringify({ query_count: currentCount + 1 })
      });
    } else {
      await sbFetch('leads', {
        method: 'POST',
        body: JSON.stringify({ email, query_count: 1 })
      });
    }

    await sbFetch('queries', {
      method: 'POST', prefer: 'return=minimal',
      body: JSON.stringify({ email, content_preview: content.substring(0, 200), score: result.overall_score })
    });

    loadingArea.style.display = 'none';
    showResult(result, currentCount + 1);

  } catch(e) {
    loadingArea.style.display = 'none';
    formArea.style.display = 'block';
    showError(e.message);
  }
}

function scoreColor(s) {
  if (s >= 70) return { bg:'#E1F5EE', text:'#085041', border:'#1D9E75' };
  if (s >= 45) return { bg:'#FAEEDA', text:'#412402', border:'#EF9F27' };
  return { bg:'#FCEBEB', text:'#501313', border:'#E24B4A' };
}

function showResult(r, queryCount) {
  const c = scoreColor(r.overall_score);
  const remaining = MAX_QUERIES - queryCount;
  resultArea.innerHTML = `
    <div class="result-card">
      <div class="score-row">
        <div class="score-circle" style="background:${c.bg};border-color:${c.border}">
          <span class="score-num" style="color:${c.text}">${r.overall_score}</span>
          <span class="score-sub" style="color:${c.text}">/100</span>
        </div>
        <div class="score-info">
          <h3>GEO alıntılanabilirlik skoru</h3>
          <p>${r.summary}</p>
        </div>
      </div>
      <div class="sec-title">Platform bazlı tahmin</div>
      <div class="platform-grid" style="margin-bottom:1.5rem">
        <div class="platform-item"><div class="platform-name">ChatGPT</div><div class="platform-score" style="color:${scoreColor(r.chatgpt_score).border}">${r.chatgpt_score}</div></div>
        <div class="platform-item"><div class="platform-name">Perplexity</div><div class="platform-score" style="color:${scoreColor(r.perplexity_score).border}">${r.perplexity_score}</div></div>
        <div class="platform-item"><div class="platform-name">Gemini</div><div class="platform-score" style="color:${scoreColor(r.gemini_score).border}">${r.gemini_score}</div></div>
      </div>
      <div class="sec-title">Tespit edilen sorunlar</div>
      ${r.issues.map(i => `<div class="issue-item">${i}</div>`).join('')}
      <div class="sec-title" style="margin-top:1rem">İyileştirme önerileri</div>
      ${r.suggestions.map(s => `<div class="suggest-item">${s}</div>`).join('')}
      ${remaining > 0 ? `<div class="remaining">${remaining} sorgu hakkınız kaldı</div>` : ''}
    </div>
    ${remaining === 0 ? `<div class="cta-box"><p>Tüm sorgu haklarınızı kullandınız. Sınırsız analiz ve detaylı GEO danışmanlığı için benimle iletişime geçin.</p><a href="https://bilaldalgun.com" target="_blank">bilaldalgun.com ile iletişime geç</a></div>` : ''}
    ${remaining > 0 ? `<button class="btn-secondary" onclick="resetForm()">Yeni içerik analiz et</button>` : ''}
  `;
}

function showLimitReached() {
  limitArea.innerHTML = `
    <div class="limit-box">
      <h3>Sorgu limitinize ulaştınız</h3>
      <p>3 ücretsiz analiz hakkınızı kullandınız. Sınırsız GEO analizi ve kişisel danışmanlık için aşağıdaki seçeneklerden birini kullanın.</p>
      <a href="https://bilaldalgun.com" target="_blank" class="limit-btn limit-btn-primary">Danışmanlık için başvur</a>
      <a href="mailto:bilal@bilaldalgun.com" class="limit-btn limit-btn-secondary">E-posta ile iletişime geç</a>
    </div>
  `;
}

function resetForm() {
  resultArea.innerHTML = '';
  limitArea.innerHTML = '';
  contentInput.value = '';
  charCount.textContent = '0';
  clearError();
  formArea.style.display = 'block';
  checkQuota(emailInput.value);
}
</script>
</body>
</html>
